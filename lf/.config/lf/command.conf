cmd on-redraw &{{
    if [ $lf_width -lt 60 ]; then
        lf -remote "send $id set preview false"
        lf -remote "send $id set ratios 1"
    elif [ $lf_width -lt 80 ]; then
        lf -remote "send $id set ratios 1:4:2"
        lf -remote "send $id set preview true"
    elif [ $lf_width -lt 160 ]; then
        lf -remote "send $id set ratios 1:3:4"
        lf -remote "send $id set preview true"
    fi
}}

cmd path_copy %{{
    lf -remote "send echo Yanked path \"$f\""
    echo "$f" | wl-copy
}}

cmd name_copy %{{
    lf -remote "send echo Yanked name $(basename "$f" | tr -d '\n')"
    echo $(basename "$f" | tr -d '\n') | wl-copy
}}

cmd time_sort :{{
    set sortby time
        set info size:time
        set noreverse
}}

cmd birth_sort :{{
    set sortby btime
    set info size:btime
    set noreverse
}}

cmd change_sort :{{
    set sortby ctime
    set info size:ctime
    set noreverse
}}

cmd name_sort :{{
    set sortby natural
    set info size:time
    set noreverse

}}

cmd size_sort :{{
    set sortby size
    set info size:time
    set noreverse
}}

cmd extract %{{
    printf "extract file?(y/n)"
    read choice
    if [ "$choice" = "y" ]; then
        case "$f" in
        *.tar) tar xf "$f" ;;
        *.zip|*.apk) unzip "$f" -d "$(basename $f | sed -E 's/.apk$|.zip$//')" ;;
        *.7z) 7z x "$f" ;;
        *.tar.gz|*.tgz|*.taz) tar xzf "$f" ;;
        *.gz) gunzip -k "$f" ;;
        *.tar.bz2|*.tbz2|*.tbz|*.tz2|*.tb2) tar xjf "$f" ;;
        *.bz2) bzip2 -dk "$f" ;;
        *.tar.xz|*.txz) tar xJf "$f" ;;
        *.xz) xz -dk "$f" ;;
        *.tar.zst|*.tzst) tar xf "$f" --zstd ;;
        *.zst) zstd -dk "$f" ;;
        *.rar) unrar -x "$f" ;;
        esac
    fi
    lf -remote "send clear"
}}

cmd toggle-preview %{{
    if [ "$lf_preview" = true ]; then
        lf -remote "send $id :set preview false; set ratios 1:5; set info size:time"
    else
        lf -remote "send $id :set preview true; set ratios 1:2:3"
    fi
}}

cmd touch %{{
    IFS=" "
    file="$*"
    touch -- "$file"
    lf -remote "send $id select \"$(printf '%s' "$file" | sed 's/\\/\\\\/g;s/"/\\"/g')\""
}}

cmd mkdir %{{
    IFS=" "
    file="$*"
    mkdir -p -- "$file"
    lf -remote "send $id select \"$(printf '%s' "$file" | sed 's/\\/\\\\/g;s/"/\\"/g')\""
}}


